name: HR2eazy Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Verify Timezone
        run: |
          echo "Current timezone:"
          date
          timedatectl || true

      - name: Build Project
        run: mvn clean compile

      - name: Run Tests
        run: mvn test -DsuiteXmlFile=testng.xml -Duser.timezone=Asia/Kolkata

      - name: Show Test Output (Debug Step)
        if: always()
        run: ls -R test-output || true

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Report
          path: test-output/
